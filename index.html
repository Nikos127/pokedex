<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <script src="./script.js"></script>
    <script src="./templates.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="./media.css">
    <link rel="icon" href="./images/pokeball.png">
    <link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body onload="init()">
    <header>
        <div class="logo">
            <img src="./images/pokeball.png" alt="">
            <h1>Pokédex</h1>
        </div>
        <div class="searchBox">
            <label for="search">Search:</label>
            <input data-id="search-input" id="search" type="text" name="search" autocomplete="off" placeholder="Character name...">
        </div>
    </header>
    <main data-id="content">
        <div id="loadSpinner" class="loadSpinner" hidden>
            <img src="./images/spin.gif" alt="Loading Pokemon data">
        </div>
        <ul id="cards" class="cards"></ul>
        <div class="loadMore">
            <button data-id="load-more-button">Load more...</button>
        </div>
        <dialog data-id="dialog" id="pokeDetailsDialog">
            <button data-id="close-dialog-button" onclick="closeDialog()">X</button>
            <div class="dialogContent" id="dialogContent">

            </div>
        </dialog>
        </div>
    </main>
    <footer>
        Pokédex by Niko
    </footer>
</body>

</html>

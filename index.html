<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <script src="./script.js"></script>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./images/pokeball.png">
    <link href="https://fonts.cdnfonts.com/css/pokemon-solid" rel="stylesheet">

</head>

<body onload="init()">
    <header>
        <div class="logo">
            <img src="./images/pokeball.png" alt="">
            <h1>Pokédex</h1>
        </div>
        <div class="searchBox">
            <label for="search">Search:</label>
            <input id="search" type="text" name="search" autocomplete="off" placeholder="Character name...">
        </div>
    </header>
    <main>
        <div id="cards" class="cards">

        </div>
        <div class="loadMore">
            <button>Load more...</button>
        </div>
        <dialog>
            <button id="closeDialog">X</button>
            <div class="dialogContent">
                <img id="dialogImage" src="" alt="">
        </dialog>
    </main>
    <footer>
        Pokédex bei Niko
    </footer>
</body>

</html>
